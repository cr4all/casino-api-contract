name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run bundle
      - name: Validate platform events contract
        run: npm run lint:events

  breaking-changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base branch
        run: git fetch --depth=1 origin ${{ github.base_ref }}
      - name: Check breaking changes against base branch
        uses: oasdiff/oasdiff-action/breaking@v0.0.57
        with:
          base: 'origin/${{ github.base_ref }}:openapi/player-v1.yaml'
          revision: 'HEAD:openapi/player-v1.yaml'
          fail-on: ERR
