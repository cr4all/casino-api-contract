openapi: 3.0.3
info:
  title: Casino Platform Player API
  version: 1.0.0
  description: |
    Player-facing REST API for the casino platform.
    Source of truth derived from `routes/api.php` and Feature Tests.

servers:
  - url: http://localhost:8000/api/v1
    description: Local development
  - url: https://api.example.com/api/v1
    description: Production

tags:
  - name: Auth
  - name: Player
  - name: Wallet
  - name: Payment
  - name: Bonus
  - name: Affiliate
  - name: Notification
  - name: Game

security:
  - bearerAuth: []

paths:
  /auth/register-options:
    get:
      tags: [Auth]
      summary: List supported registration currencies and countries
      security: []
      responses:
        '200':
          description: Registration options
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RegisterOptionsData'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new player
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RegisterResponseData'
                      message:
                        type: string
                        example: Registration successful.
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and obtain tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponseData'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RefreshResponseData'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        nullable: true
                      message:
                        type: string
                        example: Logged out successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /player/me:
    get:
      tags: [Player]
      summary: Get current player profile
      responses:
        '200':
          description: Player profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PlayerMe'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /player/profile:
    patch:
      tags: [Player]
      summary: Update player profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                  maxLength: 50
                language:
                  type: string
                  maxLength: 10
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PlayerProfileUpdate'
                      message:
                        type: string
                        example: Profile updated.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /wallet/balance:
    get:
      tags: [Wallet]
      summary: Get wallet balance
      responses:
        '200':
          description: Wallet balance
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/WalletBalance'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /wallet/transactions:
    get:
      tags: [Wallet]
      summary: List wallet transactions
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - name: type
          in: query
          description: Comma-separated transaction types (deposit, withdraw, bet, win, rollback, bonus)
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated transactions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [items, pagination]
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/WalletTransaction'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /payment/methods:
    get:
      tags: [Payment]
      summary: List active payment methods
      responses:
        '200':
          description: Payment methods
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PaymentMethod'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /payment/crypto/currencies:
    get:
      tags: [Payment]
      summary: List available crypto currencies for deposit (NOWPayments)
      responses:
        '200':
          description: Available crypto currencies
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CryptoCurrencyList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /payment/deposits/quote:
    get:
      tags: [Payment]
      summary: Estimate wallet credit for a deposit amount (FX preview)
      parameters:
        - name: payment_method_id
          in: query
          required: true
          schema:
            type: integer
        - name: amount
          in: query
          required: true
          schema:
            type: string
            example: '50000.0000'
      responses:
        '200':
          description: Deposit credit estimate
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DepositQuote'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /payment/deposits:
    get:
      tags: [Payment]
      summary: List deposit requests
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated deposits
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedDeposits'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Payment]
      summary: Create deposit request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_method_id, amount]
              properties:
                payment_method_id:
                  type: integer
                amount:
                  type: string
                  description: Decimal amount with up to 4 decimal places
                  example: '100.0000'
                pay_currency:
                  type: string
                  description: Cryptocurrency ticker for crypto payment methods (e.g. btc, usdttrc20). Required when using a crypto payment method.
                  example: usdttrc20
      responses:
        '201':
          description: Deposit created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DepositCreated'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /payment/withdrawals:
    get:
      tags: [Payment]
      summary: List withdrawal requests
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated withdrawals
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedWithdrawals'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Payment]
      summary: Create withdrawal request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_method_id, amount, destination]
              properties:
                payment_method_id:
                  type: integer
                amount:
                  type: string
                  example: '50.0000'
                destination:
                  type: object
                  additionalProperties: true
      responses:
        '201':
          description: Withdrawal created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/WithdrawalCreated'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /bonus/available:
    get:
      tags: [Bonus]
      summary: List available bonus policies
      responses:
        '200':
          description: Available bonuses
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/BonusPolicy'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /bonus/active:
    get:
      tags: [Bonus]
      summary: List active player bonuses
      responses:
        '200':
          description: Active bonuses
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ActiveBonus'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /bonus/{policyId}/claim:
    post:
      tags: [Bonus]
      summary: Claim a bonus policy
      parameters:
        - name: policyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Bonus claimed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BonusClaimed'
                      message:
                        type: string
                        example: Bonus claimed.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /affiliate/me:
    get:
      tags: [Affiliate]
      summary: Get affiliate profile and referral link
      responses:
        '200':
          description: Affiliate profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AffiliateMe'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /affiliate/stats:
    get:
      tags: [Affiliate]
      summary: Get affiliate dashboard statistics
      responses:
        '200':
          description: Affiliate stats
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AffiliateStats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /affiliate/players:
    get:
      tags: [Affiliate]
      summary: List referred players
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated referred players
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AffiliatePlayerList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /affiliate/commissions:
    get:
      tags: [Affiliate]
      summary: List commission history
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated commissions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AffiliateCommissionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /notifications/messages:
    get:
      tags: [Notification]
      summary: List internal messages
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated messages
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [items, pagination]
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/InternalMessage'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /games/vendors:
    get:
      tags: [Game]
      summary: List game vendors
      security: []
      responses:
        '200':
          description: Game vendors
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/GameVendor'

  /games/types:
    get:
      tags: [Game]
      summary: List game types
      security: []
      responses:
        '200':
          description: Game types
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/GameType'

  /games/collections/{slug}:
    get:
      tags: [Game]
      summary: Get a game collection by slug
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            example: popular
      responses:
        '200':
          description: Game collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/GameCollection'
        '404':
          $ref: '#/components/responses/NotFound'

  /games:
    get:
      tags: [Game]
      summary: List games
      security: []
      parameters:
        - name: vendor
          in: query
          schema:
            type: integer
          description: Filter by vendor ID
        - name: type
          in: query
          schema:
            type: string
          description: Filter by type slug (e.g. slot)
        - name: collection
          in: query
          schema:
            type: string
          description: Filter by collection slug
        - name: search
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated games
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [items, pagination]
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Game'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
        '422':
          $ref: '#/components/responses/ValidationError'

  /games/bets:
    get:
      tags: [Game]
      summary: List player bet history (game rounds)
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - name: game_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [bet, settled, cancelled]
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated bet history
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedBetHistory'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /games/{id}:
    get:
      tags: [Game]
      summary: Get game detail
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Game detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Game'
        '404':
          $ref: '#/components/responses/NotFound'

  /games/{id}/launch:
    post:
      tags: [Game]
      summary: Launch a game session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Launch URL and session
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/GameLaunchResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '502':
          description: Provider launch error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    SuccessEnvelope:
      type: object
      required: [success, data, message]
      properties:
        success:
          type: boolean
          enum: [true]
        data: {}
        message:
          type: string
          nullable: true

    ErrorEnvelope:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - VALIDATION_ERROR
                - NOT_FOUND
                - LAUNCH_ERROR
                - UNAUTHORIZED
                - FORBIDDEN
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    Pagination:
      type: object
      required: [current_page, per_page, total, last_page]
      properties:
        current_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        last_page:
          type: integer

    RegisterOptionsData:
      type: object
      required: [currencies, countries]
      properties:
        currencies:
          type: array
          items:
            $ref: '#/components/schemas/RegistrationCurrency'
        countries:
          type: array
          items:
            $ref: '#/components/schemas/RegistrationCountry'

    RegistrationCurrency:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          minLength: 3
          maxLength: 3
          example: USD
        name:
          type: string
          example: US Dollar

    RegistrationCountry:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          minLength: 2
          maxLength: 2
          example: US
        name:
          type: string
          example: United States

    RegisterRequest:
      type: object
      required: [email, password, password_confirmation, nickname, phone, country, currency]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        password_confirmation:
          type: string
        nickname:
          type: string
          maxLength: 50
        phone:
          type: string
          maxLength: 20
          example: '+12025550123'
          description: Phone number in E.164 format (country dial code + digits, no spaces)
        country:
          type: string
          minLength: 2
          maxLength: 2
          example: US
          description: ISO 3166-1 alpha-2 code from GET /auth/register-options
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: USD
          description: ISO 4217 code from GET /auth/register-options
        affiliate_code:
          type: string
          maxLength: 50
          nullable: true

    LoginRequest:
      type: object
      required: [password]
      properties:
        email:
          type: string
          description: Email address (use with password for email login)
        username:
          type: string
          description: Username (use with password for username login)
        phone:
          type: string
          description: Phone number in E.164 format (use with password for phone login)
        password:
          type: string
        device_fingerprint:
          type: string
          maxLength: 255
          nullable: true
        device_name:
          type: string
          maxLength: 100
          nullable: true

    UserSummary:
      type: object
      required: [id, email]
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        role:
          type: string
          example: player
          description: User role (player, affiliate, admin, operator)

    RegisterResponseData:
      type: object
