openapi: 3.0.3
info:
  title: Casino Platform Player API
  version: 1.5.0
  description: |
    Player-facing REST API for the casino platform.
    Source of truth derived from `routes/api.php` and Feature Tests.

servers:
  - url: http://localhost:8000/api/v1
    description: Local development
  - url: https://api.example.com/api/v1
    description: Production

tags:
  - name: Auth
  - name: Player
  - name: Wallet
  - name: Payment
  - name: Bonus
  - name: Affiliate
  - name: Notification
  - name: Game

security:
  - bearerAuth: []

paths:
  /auth/register-options:
    get:
      tags: [Auth]
      summary: List supported registration currencies and countries
      security: []
      responses:
        '200':
          description: Registration options
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RegisterOptionsData'

  /auth/session-policy:
    get:
      tags: [Auth]
      summary: Player session policy for client-side idle logout
      security: []
      responses:
        '200':
          description: Session policy
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SessionPolicyData'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new player
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RegisterResponseData'
                      message:
                        type: string
                        example: Registration successful.
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and obtain tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponseData'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RefreshResponseData'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        nullable: true
                      message:
                        type: string
                        example: Logged out successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/password-recovery/request:
    post:
      tags: [Auth]
      summary: Request a password recovery verification code
      description: |
        Sends a numeric verification code by email or SMS when an active player account exists.
        Provide exactly one of `email` or `phone` (E.164). Always returns success to avoid enumeration.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordRecoveryRequestBody'
      responses:
        '200':
          description: Request accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        nullable: true
                      message:
                        type: string
                        example: If an account exists for this email, a verification code has been sent.
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/password-recovery/reset:
    post:
      tags: [Auth]
      summary: Reset password using email or phone verification code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordRecoveryResetBody'
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        nullable: true
                      message:
                        type: string
                        example: Password has been reset successfully.
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /player/me:
    get:
      tags: [Player]
      summary: Get current player profile
      responses:
        '200':
          description: Player profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PlayerMe'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /player/profile:
    patch:
      tags: [Player]
      summary: Update player profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                  maxLength: 50
                language:
                  type: string
                  maxLength: 10
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PlayerProfileUpdate'
                      message:
                        type: string
                        example: Profile updated.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /player/password:
    put:
      tags: [Player]
      summary: Change player password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePlayerPasswordBody'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        nullable: true
                      message:
                        type: string
                        example: Password updated successfully.
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /wallet/balance:
    get:
      tags: [Wallet]
      summary: Get wallet balance
      responses:
        '200':
          description: Wallet balance
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/WalletBalance'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /wallet/transactions:
    get:
      tags: [Wallet]
      summary: List wallet transactions
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - name: type
          in: query
          description: Comma-separated transaction types (deposit, withdraw, bet, win, rollback, bonus)
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated transactions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [items, pagination]
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/WalletTransaction'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /payment/countries:
    get:
      tags: [Payment]
      summary: List countries available for deposit and withdrawal
      responses:
        '200':
          description: Payment countries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaymentCountryList'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /payment/deposit-options:
    get:
      tags: [Payment]
      summary: List deposit payment options for a country
      parameters:
        - name: country
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 2
            example: ID
      responses:
        '200':
          description: Deposit options
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaymentOptionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /payment/withdraw-options:
    get:
      tags: [Payment]
      summary: List withdrawal payment options for a country
      parameters:
        - name: country
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 2
            example: PH
      responses:
        '200':
          description: Withdrawal options
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaymentOptionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /payment/deposits/quote:
    get:
      tags: [Payment]
      summary: Estimate wallet credit for a deposit amount (FX preview)
      parameters:
        - name: option_key
          in: query
          required: true
          schema:
            type: string
            example: local:4:ID:QRIS
        - name: amount
          in: query
          required: true
          schema:
            type: string
            example: '50000.0000'
        - name: country
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 2
            example: ID
      responses:
        '200':
          description: Deposit credit estimate
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DepositQuote'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /payment/deposits:
    get:
      tags: [Payment]
      summary: List deposit requests
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated deposits
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedDeposits'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Payment]
      summary: Create deposit request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [option_key, amount, country]
              properties:
                option_key:
                  type: string
                  description: Selected payment option key from deposit-options response
                  example: local:4:ID:QRIS
                amount:
                  type: string
                  description: Decimal amount with up to 4 decimal places
                  example: '100.0000'
                country:
                  type: string
                  minLength: 2
                  maxLength: 2
                  description: ISO 3166-1 alpha-2 country code
                  example: ID
      responses:
        '201':
          description: Deposit created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DepositCreated'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /payment/withdrawals:
    get:
      tags: [Payment]
      summary: List withdrawal requests
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated withdrawals
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedWithdrawals'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Payment]
      summary: Create withdrawal request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [option_key, amount, country, destination]
              properties:
                option_key:
                  type: string
                  description: Selected payment option key from withdraw-options response
                  example: crypto:2:btc
                amount:
                  type: string
                  example: '50.0000'
                country:
                  type: string
                  minLength: 2
                  maxLength: 2
                  example: US
                destination:
                  type: object
                  additionalProperties: true
                  description: Destination fields (address, account, network, etc.) based on option destination_fields
      responses:
        '201':
          description: Withdrawal created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/WithdrawalCreated'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /bonus/available:
    get:
      tags: [Bonus]
      summary: List available bonus policies
      responses:
        '200':
          description: Available bonuses
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/BonusPolicy'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /bonus/active:
    get:
      tags: [Bonus]
      summary: List active player bonuses
      responses:
        '200':
          description: Active bonuses
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ActiveBonus'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /bonus/{policyId}/claim:
    post:
      tags: [Bonus]
      summary: Claim a bonus policy
      parameters:
        - name: policyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Bonus claimed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BonusClaimed'
                      message:
                        type: string
                        example: Bonus claimed.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /affiliate/me:
    get:
      tags: [Affiliate]
      summary: Get affiliate profile and referral link
      responses:
        '200':
          description: Affiliate profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AffiliateMe'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /affiliate/stats:
    get:
      tags: [Affiliate]
      summary: Get affiliate dashboard statistics
      responses:
        '200':
          description: Affiliate stats
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AffiliateStats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /affiliate/players:
    get:
      tags: [Affiliate]
      summary: List referred players
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated referred players
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AffiliatePlayerList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /affiliate/commissions:
    get:
      tags: [Affiliate]
      summary: List commission history
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated commissions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AffiliateCommissionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /affiliate/sub-affiliates:
    get:
      tags: [Affiliate]
      summary: List sub-affiliates (top-level affiliates only)
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated sub-affiliates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AffiliateSubAffiliateList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Affiliate]
      summary: Create a sub-affiliate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubAffiliateRequest'
      responses:
        '201':
          description: Sub-affiliate created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AffiliateSubAffiliate'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /affiliate/sub-affiliates/{id}:
    patch:
      tags: [Affiliate]
      summary: Update a sub-affiliate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSubAffiliateRequest'
      responses:
        '200':
          description: Sub-affiliate updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AffiliateSubAffiliate'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /affiliate/password:
    put:
      tags: [Affiliate]
      summary: Change password with current password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePlayerPasswordBody'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /notifications/messages:
    get:
      tags: [Notification]
      summary: List internal messages
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated messages
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [items, pagination]
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/InternalMessage'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /games/vendors:
    get:
      tags: [Game]
      summary: List game vendors
      security: []
      responses:
        '200':
          description: Game vendors
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/GameVendor'

  /games/types:
    get:
      tags: [Game]
      summary: List game types
      security: []
      responses:
        '200':
          description: Game types
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/GameType'

  /games/collections/{slug}:
    get:
      tags: [Game]
      summary: Get a game collection by slug
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            example: popular
      responses:
        '200':
          description: Game collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/GameCollection'
        '404':
          $ref: '#/components/responses/NotFound'

  /games:
    get:
      tags: [Game]
      summary: List games
      security: []
      parameters:
        - name: vendor
          in: query
          schema:
            type: integer
          description: Filter by vendor ID
        - name: type
          in: query
          schema:
            type: string
          description: Filter by type slug (e.g. slot)
        - name: collection
          in: query
          schema:
            type: string
          description: Filter by collection slug
        - name: search
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated games
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [items, pagination]
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Game'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
        '422':
          $ref: '#/components/responses/ValidationError'

  /games/bets:
    get:
      tags: [Game]
      summary: List player bet history (game rounds)
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - name: game_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [bet, settled, cancelled]
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: funding_source
          in: query
          schema:
            type: string
            enum: [cash, free_spin]
      responses:
        '200':
          description: Paginated bet history
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedBetHistory'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /games/{id}:
    get:
      tags: [Game]
      summary: Get game detail
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Game detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Game'
        '404':
          $ref: '#/components/responses/NotFound'

  /games/{id}/launch:
    post:
      tags: [Game]
      summary: Launch a game session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Launch URL and session
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/GameLaunchResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '502':
          description: Provider launch error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    SuccessEnvelope:
      type: object
      required: [success, data, message]
      properties:
        success:
          type: boolean
          enum: [true]
        data: {}
        message:
          type: string
          nullable: true

    ErrorEnvelope:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - VALIDATION_ERROR
                - NOT_FOUND
                - LAUNCH_ERROR
                - UNAUTHORIZED
                - FORBIDDEN
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    Pagination:
      type: object
      required: [current_page, per_page, total, last_page]
      properties:
        current_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        last_page:
          type: integer

    RegisterOptionsData:
      type: object
      required: [currencies, countries]
      properties:
        currencies:
          type: array
          items:
            $ref: '#/components/schemas/RegistrationCurrency'
        countries:
          type: array
          items:
            $ref: '#/components/schemas/RegistrationCountry'

    SessionPolicyData:
      type: object
      required: [idle_timeout_minutes]
      properties:
        idle_timeout_minutes:
          type: integer
          minimum: 0
          maximum: 480
          description: Minutes of inactivity before automatic logout. 0 disables idle logout.

    RegistrationCurrency:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          minLength: 3
          maxLength: 3
          example: USD
        name:
          type: string
          example: US Dollar

    RegistrationCountry:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          minLength: 2
          maxLength: 2
          example: US
        name:
          type: string
          example: United States

    RegisterRequest:
      type: object
      required: [email, password, password_confirmation, nickname, phone, country, currency]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        password_confirmation:
          type: string
        nickname:
          type: string
          maxLength: 50
        phone:
          type: string
          maxLength: 20
          example: '+12025550123'
          description: Phone number in E.164 format (country dial code + digits, no spaces)
        country:
          type: string
          minLength: 2
          maxLength: 2
          example: US
          description: ISO 3166-1 alpha-2 code from GET /auth/register-options
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: USD
          description: ISO 4217 code from GET /auth/register-options
        affiliate_code:
          type: string
          maxLength: 50
          nullable: true

    LoginRequest:
      type: object
      required: [password]
      properties:
        email:
          type: string
          description: Email address (use with password for email login)
        username:
          type: string
          description: Username (use with password for username login)
        phone:
          type: string
          description: Phone number in E.164 format (use with password for phone login)
        password:
          type: string
        device_fingerprint:
          type: string
          maxLength: 255
          nullable: true
        device_name:
          type: string
          maxLength: 100
          nullable: true

    PasswordRecoveryRequestBody:
      type: object
      description: Exactly one of email or phone is required.
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          example: player@example.com
        phone:
          type: string
          maxLength: 20
          pattern: '^\+[1-9]\d{1,14}$'
          example: '+12025550123'
          description: Phone number in E.164 format

    PasswordRecoveryResetBody:
      type: object
      description: Exactly one of email or phone is required (same channel used for the code request).
      required: [code, password, password_confirmation]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          example: player@example.com
        phone:
          type: string
          maxLength: 20
          pattern: '^\+[1-9]\d{1,14}$'
          example: '+12025550123'
        code:
          type: string
          pattern: '^\d{6}$'
          example: '123456'
          description: Six-digit verification code sent by email or SMS
        password:
          type: string
          minLength: 8
        password_confirmation:
          type: string
          minLength: 8

    UserSummary:
      type: object
      required: [id, email]
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        role:
          type: string
          example: player
          description: User role (player, affiliate, admin, sales, support)

    RegisterResponseData:
      type: object
      required: [user, access_token, expires_in]
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        access_token:
          type: string
        expires_in:
          type: integer
          description: Access token TTL in seconds

    LoginResponseData:
      type: object
      required: [access_token, expires_in, refresh_token, user]
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
        refresh_token:
          type: string
        user:
          $ref: '#/components/schemas/UserSummary'

    RefreshResponseData:
      type: object
      required: [access_token, refresh_token]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string

    PlayerMe:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        user_id:
          type: integer
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        nickname:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
          description: Phone number in E.164 format
          example: '+12025550123'
        country:
          type: string
          nullable: true
          description: ISO 3166-1 alpha-2 country code
          example: SG
        country_name:
          type: string
          nullable: true
          description: Human-readable country name resolved from platform config
          example: Singapore
        currency:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
          example: en
        status:
          type: string
          nullable: true
          description: Player account status
          example: active
        kyc_status:
          type: string
          nullable: true
          description: KYC verification status
          example: pending

    PlayerProfileUpdate:
      allOf:
        - $ref: '#/components/schemas/PlayerMe'

    ChangePlayerPasswordBody:
      type: object
      required: [current_password, password, password_confirmation]
      properties:
        current_password:
          type: string
        password:
          type: string
          minLength: 8
        password_confirmation:
          type: string
          minLength: 8

    WalletBalance:
      type: object
      required: [wallet_id, player_id, currency, balance, status]
      properties:
        wallet_id:
          type: integer
        player_id:
          type: integer
        currency:
          type: string
        balance:
          type: string
          example: '1250.0000'
        status:
          type: string

    WalletBalanceEvent:
      allOf:
        - $ref: '#/components/schemas/WalletBalance'
        - type: object
          properties:
            ledger_id:
              type: integer
              nullable: true
            event_type:
              type: string
              example: payment.deposit

    WalletTransaction:
      type: object
      required: [id, type, amount, status]
      properties:
        id:
          type: integer
        type:
          type: string
        amount:
          type: string
        balance_after:
          type: string
          nullable: true
        status:
          type: string
        description:
          type: string
          nullable: true
        reference_type:
          type: string
          nullable: true
        reference_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true

    BetHistoryGame:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        name:
          type: string
        provider:
          type: string
          nullable: true

    BetHistoryItem:
      type: object
      required: [id, round_id, bet_amount, win_amount, net_amount, status, currency, funding_source]
      properties:
        id:
          type: integer
        round_id:
          type: string
        game:
          $ref: '#/components/schemas/BetHistoryGame'
        bet_amount:
          type: string
        win_amount:
          type: string
        net_amount:
          type: string
        status:
          type: string
        funding_source:
          type: string
          enum: [cash, free_spin]
          description: Spin funding source — cash wallet or free spin bonus.
        spin_type:
          type: string
          description: Human-readable spin type label (e.g. Cash Spin, Free Spin).
        currency:
          type: string
        played_at:
          type: string
          format: date-time
          nullable: true

    PaginatedBetHistory:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BetHistoryItem'
        pagination:
          $ref: '#/components/schemas/Pagination'

    PaymentCountry:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          minLength: 2
          maxLength: 2
          example: ID
        name:
          type: string
          example: Indonesia

    PaymentCountryList:
      type: object
      required: [countries]
      properties:
        countries:
          type: array
          items:
            $ref: '#/components/schemas/PaymentCountry'
        default_country:
          type: string
          nullable: true
          example: ID

    PaymentDestinationField:
      type: object
      required: [name, label, required]
      properties:
        name:
          type: string
          example: address
        label:
          type: string
          example: Wallet address
        required:
          type: boolean

    PaymentOption:
      type: object
      required: [key, payment_method_id, kind, label, payment_currency, min_amount, destination_fields]
      properties:
        key:
          type: string
          example: local:4:PH:GCASH
        payment_method_id:
          type: integer
        kind:
          type: string
          enum: [local, crypto, manual]
        provider:
          type: string
          nullable: true
          example: smilepayz
        label:
          type: string
          example: GCash
        description:
          type: string
          nullable: true
        logo_url:
          type: string
          nullable: true
        logo_key:
          type: string
          nullable: true
          example: gcash
        payment_currency:
          type: string
          example: PHP
        min_amount:
          type: string
          description: >
            Minimum deposit amount in payment_currency. For local deposit options this value is
            converted from the player's wallet currency, normalized for display, and expressed in
            the regional payment currency (e.g. IDR, PHP).
          example: '10000.0000'
        max_amount:
          type: string
          nullable: true
          description: >
            Maximum deposit amount in payment_currency, or null when no limit applies. For local
            deposit options this value is converted from the player's wallet currency, normalized
            for display, and expressed in the regional payment currency.
          example: '150000000.0000'
        local_country:
          type: string
          nullable: true
          example: PH
        local_payment_method:
          type: string
          nullable: true
          example: GCASH
        pay_currency:
          type: string
          nullable: true
          example: btc
        destination_fields:
          type: array
          items:
            $ref: '#/components/schemas/PaymentDestinationField'

    PaymentOptionList:
      type: object
      required: [country, items]
      properties:
        country:
          $ref: '#/components/schemas/PaymentCountry'
        items:
          type: array
          items:
            $ref: '#/components/schemas/PaymentOption'

    DepositQuote:
      type: object
      required:
        - payment_amount
        - payment_currency
        - credited_amount
        - wallet_currency
        - exchange_rate
        - is_estimate
      properties:
        payment_amount:
          type: string
        payment_currency:
          type: string
        credited_amount:
          type: string
        wallet_currency:
          type: string
        exchange_rate:
          type: string
        exchange_rate_at:
          type: string
          format: date-time
        rate_display:
          type: string
        is_estimate:
          type: boolean
          description: True for preview; final credit is determined at payment confirmation

    DepositCreated:
      type: object
      required: [deposit_id, status, amount, payment_info]
      properties:
        deposit_id:
          type: integer
        status:
          type: string
        amount:
          type: string
        currency:
          type: string
        estimated_credit:
          type: object
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DepositQuote'
        payment_info:
          type: object
          additionalProperties: true

    WithdrawalCreated:
      type: object
      required: [withdrawal_id, status, amount]
      properties:
        withdrawal_id:
          type: integer
        status:
          type: string
        amount:
          type: string

    DepositItem:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: string
        received_amount:
          type: string
          nullable: true
          description: Actual amount received from the payment provider (payment currency)
        currency:
          type: string
        credited_amount:
          type: string
          nullable: true
          description: Wallet points credited after confirmation
        credited_currency:
          type: string
          nullable: true
        status:
          type: string
        payment_method:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        confirmed_at:
          type: string
          format: date-time
          nullable: true

    WithdrawalItem:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: string
        currency:
          type: string
        status:
          type: string
        payment_method:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        processed_at:
          type: string
          format: date-time
          nullable: true

    PaginatedDeposits:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DepositItem'
        pagination:
          $ref: '#/components/schemas/Pagination'

    PaginatedWithdrawals:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WithdrawalItem'
        pagination:
          $ref: '#/components/schemas/Pagination'

    BonusPolicy:
      type: object
      required: [policy_id, name, type, amount_type, amount_value, wagering_multiplier, claimable]
      properties:
        policy_id:
          type: integer
        name:
          type: string
        type:
          type: string
        amount_type:
          type: string
        amount_value:
          type: string
        wagering_multiplier:
          type: number
        claimable:
          type: boolean
        claim_blocked_reason:
          type: string
          nullable: true
          enum: [deposit_required, deposit_after_valid_from_required, already_claimed, provider_not_supported]
        spin_count:
          type: integer
          nullable: true
        provider_slug:
          type: string
          nullable: true
        provider_name:
          type: string
          nullable: true

    ActiveBonus:
      type: object
      properties:
        id:
          type: integer
        policy_name:
          type: string
          nullable: true
        type:
          type: string
          nullable: true
        amount:
          type: string
        status:
          type: string
        wagering:
          type: object
          nullable: true
          properties:
            required:
              type: string
            wagered:
              type: string
        spin_count:
          type: integer
          nullable: true
        spins_used:
          type: integer
          nullable: true
        spins_remaining:
          type: integer
          nullable: true
        provider_slug:
          type: string
          nullable: true
        provider_bonus_id:
          type: integer
          nullable: true

    BonusClaimed:
      type: object
      required: [bonus_id, amount, status]
      properties:
        bonus_id:
          type: integer
        amount:
          type: string
        status:
          type: string
        spin_count:
          type: integer
          nullable: true
        spins_used:
          type: integer
          nullable: true
        provider_bonus_id:
          type: integer
          nullable: true

    InternalMessage:
      type: object
      properties:
        id:
          type: integer
        subject:
          type: string
        body:
          type: string
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
          nullable: true

    GameVendor:
      type: object
      required: [id, slug, name, game_count, sort_order]
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        logo_url:
          type: string
          nullable: true
        sort_order:
          type: integer
        game_count:
          type: integer

    GameType:
      type: object
      required: [id, slug, name, game_count]
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        icon:
          type: string
          nullable: true
        game_count:
          type: integer

    GameVendorRef:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string

    GameTypeRef:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string

    Game:
      type: object
      required: [id, name, game_code]
      properties:
        id:
          type: integer
        name:
          type: string
        name_ko:
          type: string
          nullable: true
        thumbnail:
          type: string
          nullable: true
        game_code:
          type: string
        symbol:
          type: string
          nullable: true
        vendor:
          allOf:
            - $ref: '#/components/schemas/GameVendorRef'
        type:
          allOf:
            - $ref: '#/components/schemas/GameTypeRef'

    GameCollection:
      type: object
      required: [slug, name, games]
      properties:
        slug:
          type: string
        name:
          type: string
        games:
          type: array
          items:
            $ref: '#/components/schemas/Game'

    GameLaunchResult:
      type: object
      required: [launch_url, session_id, session_token]
      properties:
        launch_url:
          type: string
          format: uri
        session_id:
          type: integer
        session_token:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true

    AffiliateMe:
      type: object
      required: [code, commission_model, commission_rate, status, referral_link, is_sub_affiliate, can_manage_sub_affiliates]
      properties:
        code:
          type: string
        commission_model:
          type: string
          enum: [cpa, revshare, hybrid]
        commission_rate:
          type: string
        cpa_amount:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive]
        referral_link:
          type: string
          example: '?ref=AFF001'
        is_sub_affiliate:
          type: boolean
        can_manage_sub_affiliates:
          type: boolean
        parent_code:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        email_verified:
          type: boolean

    AffiliateStats:
      type: object
      required: [referred_players_count, commissions_count, total_commission, pending_commission]
      properties:
        referred_players_count:
          type: integer
        commissions_count:
          type: integer
        total_commission:
          type: string
        pending_commission:
          type: string
        sub_affiliates_count:
          type: integer
        downline_players_count:
          type: integer
        override_commission:
          type: string
        pending_override_commission:
          type: string

    AffiliateReferredPlayer:
      type: object
      required: [player_id, registered_at]
      properties:
        player_id:
          type: integer
        nickname:
          type: string
          nullable: true
        registered_at:
          type: string
          format: date-time

    AffiliatePlayerList:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AffiliateReferredPlayer'
        pagination:
          $ref: '#/components/schemas/Pagination'

    AffiliateCommission:
      type: object
      required: [id, player_id, type, amount, reference_type, reference_id, status]
      properties:
        id:
          type: integer
        player_id:
          type: integer
        type:
          type: string
          enum: [cpa, revshare, override]
        amount:
          type: string
        reference_type:
          type: string
        reference_id:
          type: string
        status:
          type: string
          enum: [pending, paid]
        created_at:
          type: string
          format: date-time
          nullable: true

    AffiliateCommissionList:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AffiliateCommission'
        pagination:
          $ref: '#/components/schemas/Pagination'

    AffiliateSubAffiliate:
      type: object
      required: [id, code, commission_model, commission_rate, status, referred_players_count]
      properties:
        id:
          type: integer
        code:
          type: string
        commission_model:
          type: string
          enum: [cpa, revshare, hybrid]
        commission_rate:
          type: string
        cpa_amount:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive]
        referred_players_count:
          type: integer
        created_at:
          type: string
          format: date-time
          nullable: true

    AffiliateSubAffiliateList:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AffiliateSubAffiliate'
        pagination:
          $ref: '#/components/schemas/Pagination'

    CreateSubAffiliateRequest:
      type: object
      required: [code, email, password, commission_model]
      properties:
        code:
          type: string
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        commission_model:
          type: string
          enum: [cpa, revshare, hybrid]
        commission_rate:
          type: number
          minimum: 0
          maximum: 100
        cpa_amount:
          type: number
          minimum: 0
        status:
          type: string
          enum: [active, inactive]

    UpdateSubAffiliateRequest:
      type: object
      properties:
        commission_model:
          type: string
          enum: [cpa, revshare, hybrid]
        commission_rate:
          type: number
          minimum: 0
          maximum: 100
        cpa_amount:
          type: number
          minimum: 0
          nullable: true
        status:
          type: string
          enum: [active, inactive]

x-realtime:
  walletBalance:
    summary: Real-time wallet balance (WebSocket)
    description: |
      Subscribe via Laravel Reverb (Pusher protocol) for live balance updates.
      Initial balance should be fetched with `GET /wallet/balance`.
    connection:
      url: "ws(s)://{REVERB_HOST}:{REVERB_PORT}/app/{REVERB_APP_KEY}"
      protocol: websocket
    auth:
      method: POST
      url: /api/broadcasting/auth
      security:
        - bearerAuth: []
      body:
        channel_name: private-wallet.player.{playerId}
        socket_id: string
    channel: private-wallet.player.{playerId}
    event: balance.updated
    payload:
      $ref: '#/components/schemas/WalletBalanceEvent'
